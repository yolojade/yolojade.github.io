<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>파이썬 문제 모음</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 40px 20px;
        font-family: "Malgun Gothic", "맑은 고딕", Arial, sans-serif;
        background: #f4f4f4;
        color: #111;
      }
      .wrap {
        max-width: 900px;
        margin: 0 auto;
      }
      h1 {
        text-align: center;
        margin-bottom: 30px;
      }
      .card-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
      }
      .card {
        background: #fff;
        border: 1px solid #ccc;
        padding: 20px;
        text-decoration: none;
        color: #111;
        border-radius: 10px;
        transition: 0.2s;
      }
      .card:hover {
        transform: translateY(-3px);
        background: #fafafa;
      }
      .card h2 {
        margin-top: 0;
        font-size: 22px;
      }
      .card p {
        margin-bottom: 0;
        color: #555;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>파이썬 문제 모음</h1>

      <div class="card-list">
        <a class="card" href="./quiz1/">
          <h2>1번 문제</h2>
          <p>리스트 기초 문제 풀기</p>
        </a>

        <a class="card" href="./quiz2/">
          <h2>2번 문제</h2>
          <p>문자열 문제 풀기</p>
        </a>
      </div>
    </div>
  </body>
</html>
