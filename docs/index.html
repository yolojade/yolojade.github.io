<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>출석 시스템</title>
  <style>
    body { font-family: Arial; padding:20px; }
    input, button { padding:8px; margin:5px; }
    .card { border:1px solid #ddd; padding:10px; margin:10px 0; }
  </style>
</head>
<body>

<h2>🔧 API 설정</h2>
<input id="apiUrl" placeholder="Apps Script URL (/exec까지)">
<button onclick="saveApi()">저장</button>
<button onclick="testApi()">연결 테스트</button>

<hr>

<h2>👤 회원 검색</h2>
<input id="keyword" placeholder="이름 / ID / 전화번호">
<button onclick="search()">검색</button>

<div id="result"></div>

<hr>

<h2>➕ 회원 등록</h2>
<input id="name" placeholder="이름"><br>
<input id="phone" placeholder="전화번호"><br>
<input id="course" placeholder="과정"><br>
<input id="total" placeholder="총횟수"><br>
<button onclick="register()">등록</button>

<script>
let API_URL = localStorage.getItem("api") || "";
document.getElementById("apiUrl").value = API_URL;

function saveApi(){
  const url = document.getElementById("apiUrl").value.trim();
  if(!url.includes("/exec")){
    alert("잘못된 URL");
    return;
  }
  API_URL = url;
  localStorage.setItem("api", url);
  alert("저장됨");
}

function jsonp(action, params={}){
  return new Promise((resolve, reject)=>{
    const cb = "cb_" + Date.now();
    const url = new URL(API_URL);
    url.searchParams.set("action", action);
    url.searchParams.set("cb", cb);

    Object.keys(params).forEach(k=>{
      url.searchParams.set(k, params[k]);
    });

    window[cb] = function(data){
      delete window[cb];
      document.body.removeChild(script);
      resolve(data);
    }

    const script = document.createElement("script");
    script.src = url.toString();

    script.onerror = function(){
      reject("API 실패");
    }

    document.body.appendChild(script);
  });
}

async function testApi(){
  try{
    await jsonp("health");
    alert("API 연결 성공");
  }catch(e){
    alert("API 연결 실패");
  }
}

async function search(){
  const keyword = document.getElementById("keyword").value.trim();
  if(!keyword){
    alert("검색어 입력");
    return;
  }

  try{
    const res = await jsonp("findMembers",{keyword});
    if(!res.success){
      alert("검색 실패");
      return;
    }

    const list = res.data.members;

    const html = list.map(m=>`
      <div class="card">
        <b>${m.name}</b> (${m.memberId})<br>
        잔여: <span id="remain_${m.memberId}">${m.remainingSessions}</span><br>
        <button onclick="checkin('${m.memberId}')">출석</button>
      </div>
    `).join("");

    document.getElementById("result").innerHTML = html;

  }catch(e){
    alert("검색 오류");
  }
}

async function checkin(id){
  try{
    const res = await jsonp("checkin",{memberId:id});
    if(!res.success){
      alert("출석 실패");
      return;
    }

    document.getElementById("remain_"+id).innerText = res.data.remainingSessions;
    alert("출석 완료");

  }catch(e){
    alert("출석 오류");
  }
}

async function register(){
  const data = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    course: document.getElementById("course").value,
    totalSessions: document.getElementById("total").value
  };

  try{
    const res = await jsonp("registerMember", data);
    if(!res.success){
      alert("등록 실패");
      return;
    }

    alert("등록 완료");

  }catch(e){
    alert("등록 오류");
  }
}
</script>

</body>
</html>
