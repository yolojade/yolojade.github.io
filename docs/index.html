<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PT 회원 출석관리</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header class="header nav-header">
      <div>
        <h1>PT 회원 출석관리</h1>
        <p>회원은 회원번호만 입력해서 출석체크할 수 있습니다.</p>
      </div>
      <nav class="top-nav">
        <a href="index.html" class="nav-link active">출석체크</a>
        <a href="schedule.html" class="nav-link">스케줄</a>
      </nav>
    </header>

    <section class="panel hero">
      <h2>출석체크</h2>
      <p class="desc">회원번호를 입력하고 출석 버튼을 누르세요.</p>
      <div class="row">
        <input type="text" id="memberNoInput" placeholder="예: PT0001" />
        <button id="checkInByNoBtn" class="action-checkin big">출석체크</button>
      </div>
      <div id="checkinStatus" class="status large">준비됨</div>
    </section>

    <section class="panel admin-panel">
      <div class="section-title">
        <h2>관리자 메뉴</h2>
        <button id="toggleAdminBtn" class="secondary">열기</button>
      </div>

      <div id="adminArea" class="admin-area hidden">
        <div id="adminLockBox" class="admin-lock-box">
          <p class="desc">관리자 PIN을 입력해야 등록/횟수추가 기능을 사용할 수 있습니다.</p>
          <div class="row">
            <input type="password" id="adminPinInput" placeholder="관리자 PIN" />
            <button id="unlockAdminBtn">잠금 해제</button>
          </div>
          <div id="adminLockStatus" class="status"></div>
        </div>

        <div id="adminContent" class="hidden">
          <div class="admin-grid">
            <section class="subpanel">
              <h3>회원 등록</h3>
              <div class="stack">
                <input type="text" id="name" placeholder="이름" />
                <input type="text" id="phone" placeholder="전화번호(선택)" />
                <button id="addBtn" class="action-add">회원 등록 (기본 10회)</button>
              </div>
              <div id="registerStatus" class="status"></div>
            </section>

            <section class="subpanel">
              <h3>회원 검색 / 횟수 추가</h3>
              <div class="row">
                <input type="text" id="searchAdmin" placeholder="이름 또는 회원번호 검색" />
                <button id="searchAdminBtn">검색</button>
              </div>
              <div id="adminSearchStatus" class="status"></div>
              <div id="adminMemberList" class="grid"></div>
            </section>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
