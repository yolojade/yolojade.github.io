<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PT 스케줄</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header class="header nav-header">
      <div>
        <h1>PT 스케줄</h1>
        <p>날짜를 클릭하면 해당 날짜의 출석 시간과 회원 정보를 확인할 수 있습니다.</p>
      </div>
      <nav class="top-nav">
        <a href="index.html" class="nav-link">출석체크</a>
        <a href="schedule.html" class="nav-link active">스케줄</a>
      </nav>
    </header>

    <div class="schedule-layout">
      <section class="panel calendar-panel">
        <div class="calendar-header">
          <button id="prevMonthBtn" class="secondary icon-btn">‹</button>
          <h2 id="calendarTitle">2026년 3월</h2>
          <button id="nextMonthBtn" class="secondary icon-btn">›</button>
        </div>

        <div class="weekday-grid">
          <div>일</div>
          <div>월</div>
          <div>화</div>
          <div>수</div>
          <div>목</div>
          <div>금</div>
          <div>토</div>
        </div>

        <div id="calendarGrid" class="calendar-grid"></div>
      </section>

      <section class="panel day-panel">
        <div class="day-top">
          <div>
            <h2 id="selectedDateTitle">날짜를 선택하세요</h2>
            <p id="selectedDateSummary" class="desc">출석 기록과 예약 확인 영역입니다.</p>
          </div>
          <button id="todayBtn" class="secondary">오늘로 이동</button>
        </div>

        <div class="info-strip">
          <div class="info-box">
            <div class="label">출석 인원</div>
            <div id="attendanceCount" class="value">0명</div>
          </div>
          <div class="info-box">
            <div class="label">첫 출석</div>
            <div id="firstCheckin" class="value">-</div>
          </div>
          <div class="info-box">
            <div class="label">마지막 출석</div>
            <div id="lastCheckin" class="value">-</div>
          </div>
        </div>

        <div class="tabs">
          <button id="attendanceTabBtn" class="tab-btn active">출석 기록</button>
          <button id="reservationTabBtn" class="tab-btn">예약 수업</button>
        </div>

        <div id="attendanceTab" class="tab-panel">
          <div id="attendanceList" class="list-wrap"></div>
        </div>

        <div id="reservationTab" class="tab-panel hidden">
          <div class="empty">
            예약 수업 기능은 다음 단계에서 연결할 수 있도록 자리만 만들어두었습니다.
          </div>
        </div>
      </section>
    </div>
  </div>

  <script src="schedule.js"></script>
</body>
</html>
